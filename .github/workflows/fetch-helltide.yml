name: Fetch Helltide Data

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch live data from Firebase
        run: |
          mkdir -p data
          HELLTIDE=$(curl -sf "https://helltides-7e530-r1.firebaseio.com/helltide.json")
          BOSS=$(curl -sf "https://helltides-7e530-r1.firebaseio.com/world_boss.json")
          LEGION=$(curl -sf "https://helltides-7e530-r1.firebaseio.com/legion.json")
          echo "{\"helltide\":${HELLTIDE},\"world_boss\":${BOSS},\"legion\":${LEGION},\"fetchedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data/helltide.json
          echo "Fetched OK"
          cat data/helltide.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/helltide.json
          git diff --cached --quiet || git commit -m "chore: update helltide data"
          git push
